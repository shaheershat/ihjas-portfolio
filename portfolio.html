<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="header-include"></div>

    <main id="content">
        <section id="portfolio" class="page-section active pt-32">
            <div class="max-w-7xl mx-auto px-6 md:px-12 pb-20">
                <h2 class="text-5xl md:text-7xl font-extrabold mb-6">Projects<span class="text-cyan-500">.</span></h2>

                <!-- Portfolio filter -->
                <div class="flex gap-3 mb-12 overflow-x-auto pb-2" id="filter-bar">
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="all">All Projects</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="ai generated">AI Generated</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="personal branding">Personal Branding</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="freelance">Freelance</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="social media">Social Media</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="b roll">B-Roll</button>
                    <button class="filter-btn px-6 py-2 bg-zinc-800 text-white font-bold rounded-full hover:bg-cyan-400 transition-colors whitespace-nowrap" data-category="freelance, social media, promo videos">Promo Videos</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="portfolio-grid">
                    <!-- Portfolio cards will be loaded here from JSON data -->
                </div>
            </div>
        </section>
    </main>

    <!-- cookie bar removed -->

    <div id="video-modal" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 md:p-20 opacity-0 pointer-events-none transition-opacity duration-300">
        <button id="close-modal" class="absolute top-10 right-10 text-white hover:text-cyan-400">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
            <div class="w-full max-w-6xl aspect-video bg-zinc-900 rounded-3xl flex items-center justify-center relative overflow-hidden"></div>
    </div>

    <div id="footer-include"></div>

    <script>
        fetch('header.html').then(r=>r.text()).then(html=>document.getElementById('header-include').innerHTML=html);
        fetch('footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-include').innerHTML=html);
    </script>
    <script src="js/main.js"></script>
    <script src="js/portfolio-loader.js"></script>
    <script>
        (function(){
            if (window.initPortfolioVideos) window.initPortfolioVideos();
        })();
    </script>
</body>
</html>
