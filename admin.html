<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <!-- Login Screen -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="max-w-md w-full px-6">
            <div class="bg-zinc-900 rounded-2xl p-8">
                <h1 class="text-3xl font-bold mb-6 text-cyan-400">Admin Login</h1>
                
                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" required 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-400 focus:outline-none focus:border-cyan-500"
                               placeholder="Enter username">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" required 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-400 focus:outline-none focus:border-cyan-500"
                               placeholder="Enter password">
                    </div>
                    
                    <button type="submit" 
                            class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold px-6 py-3 rounded-lg transition-colors">
                        Login
                    </button>
                </form>
                
                <div id="login-error" class="mt-4 text-red-400 text-sm hidden">
                    Invalid username or password
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Interface (Hidden until login) -->
    <div id="admin-interface" class="hidden min-h-screen">
        <div class="max-w-4xl mx-auto px-6 py-12">
            <!-- Header with Logout -->
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold text-cyan-400">Portfolio Admin</h1>
                <button onclick="logout()" 
                        class="bg-zinc-700 hover:bg-zinc-600 text-white px-4 py-2 rounded-lg transition-colors">
                    Logout
                </button>
            </div>
            
            <!-- Add Video Form -->
            <div class="bg-zinc-900 rounded-2xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6">Add New Video</h2>
                
                <form id="add-video-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Video Title</label>
                        <input type="text" id="video-name" required 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-400 focus:outline-none focus:border-cyan-500"
                               placeholder="Enter video title">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="video-description" required rows="3"
                                  class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-400 focus:outline-none focus:border-cyan-500"
                                  placeholder="Brief description of the video"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">YouTube URL</label>
                        <input type="url" id="video-url" required 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-400 focus:outline-none focus:border-cyan-500"
                               placeholder="https://youtu.be/VIDEO_ID or https://www.youtube.com/watch?v=VIDEO_ID">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-zinc-300 mb-2">Category</label>
                        <select id="video-category" required 
                                class="w-full bg-zinc-700 border border-zinc-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500">
                            <option value="">Select a category</option>
                            <option value="ai generated">AI Generated</option>
                            <option value="personal branding">Personal Branding</option>
                            <option value="freelance, social media">Freelance & Social Media</option>
                            <option value="b roll">B-Roll</option>
                            <option value="freelance, social media, promo videos">Promo Videos</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Date</label>
                        <input type="date" id="video-date" required 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    
                    <div class="flex gap-4">
                        <button type="submit" 
                                class="bg-cyan-500 hover:bg-cyan-600 text-black font-bold px-6 py-3 rounded-lg transition-colors">
                            Add Video
                        </button>
                        <button type="button" onclick="resetForm()"
                                class="bg-zinc-700 hover:bg-zinc-600 text-white font-bold px-6 py-3 rounded-lg transition-colors">
                            Reset
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Current Videos -->
            <div class="bg-zinc-900 rounded-2xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-white mb-4">Current Videos</h2>
                    <button onclick="exportData()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                        Export Data
                    </button>
                </div>
                <div id="videos-list" class="space-y-4">
                    <!-- Videos will be loaded here -->
                </div>
            </div>

            <!-- Export/Import -->
            <div class="bg-zinc-900 rounded-2xl p-8 mt-8">
                <div class="flex gap-4 flex-wrap">
                    <button onclick="document.getElementById('import-file').click()" 
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition-colors">
                        Import Data
                    </button>
                    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
