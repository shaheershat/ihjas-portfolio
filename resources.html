<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="header-include"></div>
    <main>
        <section id="resources" class="page-section active pt-32">
            <div class="max-w-7xl mx-auto px-6 md:px-12 py-20">
                <h2 class="text-5xl md:text-7xl font-extrabold mb-16">Editor <span class="highlight-pink">Toolkit</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white text-black p-8 rounded-3xl flex justify-between items-center group cursor-pointer hover:bg-cyan-400 transition-colors">
                        <div>
                            <span class="text-xs font-bold uppercase tracking-widest mb-2 block opacity-60">Digital Product</span>
                            <h3 class="text-3xl font-extrabold">Ultimate Overlay Pack</h3>
                        </div>
                        <div class="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                    <div class="bg-zinc-800 p-8 rounded-3xl flex justify-between items-center group cursor-pointer hover:bg-zinc-700 transition-colors">
                        <div>
                            <span class="text-xs font-bold uppercase tracking-widest mb-2 block text-zinc-400">Free PDF</span>
                            <h3 class="text-3xl font-extrabold">Engagement Strategy Guide</h3>
                        </div>
                        <div class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="page-section active pt-20 pb-32 reveal-item">
            <div class="max-w-7xl mx-auto px-6 md:px-12">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
                    <div class="order-2 md:order-1">
                        <div class="rounded-3xl overflow-hidden bg-zinc-800 aspect-[3/4]">
                            <img src="#" alt="Contact image" class="w-full h-full object-cover block">
                        </div>
                    </div>
                    <div class="order-1 md:order-2">
                        <h2 class="text-4xl md:text-6xl font-extrabold mb-6">Got an idea? <span class="highlight-blue">Say hi!</span></h2>
                        <p class="text-zinc-400 mb-8">Have a project in mind? Fill out the form below and I'll get back to you within 48 hours.</p>

                        <form id="contact-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Full Name</label>
                                    <input name="from_name" type="text" placeholder="Your name" required class="w-full bg-transparent border-b-2 border-zinc-800 focus:border-cyan-500 py-3 outline-none transition-colors">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Email Address</label>
                                    <input name="from_email" type="email" placeholder="Your e-mail" required class="w-full bg-transparent border-b-2 border-zinc-800 focus:border-cyan-500 py-3 outline-none transition-colors">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Project Details</label>
                                <textarea name="message" placeholder="Tell me about your vision..." rows="5" required class="w-full bg-transparent border-b-2 border-zinc-800 focus:border-cyan-500 py-3 outline-none transition-colors resize-none"></textarea>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Instagram Handle</label>
                                    <input name="instagram" type="text" placeholder="@Your instagram handle" required class="w-full bg-transparent border-b-2 border-zinc-800 focus:border-cyan-500 py-3 outline-none transition-colors">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-zinc-500 mb-2">Budget Range</label>
                                    <select name="budget" required class="w-full bg-transparent border-b-2 border-zinc-800 focus:border-cyan-500 py-3 outline-none transition-colors appearance-none">
                                        <option class="bg-black">$1k - $3k</option>
                                        <option class="bg-black">$3k - $5k</option>
                                        <option class="bg-black">$5k - $10k</option>
                                        <option class="bg-black">$10k+</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn-motion inline-block bg-white text-black px-6 py-3 font-bold uppercase text-base rounded-full">Send Proposal</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-include"></div>
    <script>fetch('header.html').then(r=>r.text()).then(html=>document.getElementById('header-include').innerHTML=html);fetch('footer.html').then(r=>r.text()).then(html=>document.getElementById('footer-include').innerHTML=html);</script>
    <script src="js/main.js"></script>
</body>
</html>
